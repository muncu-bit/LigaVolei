<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Crear Liga</title>
    <link rel="stylesheet" href="../../../src/main/resources/public/css/styles.css">

</head>
<body>

   

<div class="contenedor-equipo">
    <div class="contenedor">

        <div class="form-container">

             <h2>CREAR LIGA</h2>

             <div class="input">
        <label for="nombre">Nombre de la Liga</label>

        <input type="text" placeholder="Ingresa el nombre">
             </div>
            
             <div class="input">
        <label for="Descripción">Descripción</label>
        <textarea id="descripción" placeholder="Ingresa la descripción">
            </textarea>
             </div>

             <div class="input">
               
        <label>Foto de Liga</label>
         <input type="file" id="foto" accept="image/*">
             </div>


       <div class="input">     
    <label>Elige estadio</label>
    <div class="radios">
        <label><input type="radio" name="estadio"> Estadio 1</label>
         <label><input type="radio" name="estadio"> Estadio 2</label>
          <label><input type="radio" name="estadio"> Estadio 3</label>
    </div>
    <div class="buttons-group">
        <button>CREAR</button>
        <a href="../index-admin.html">
        <button class="salir">CANCELAR</button>
            </a>

        
    </div>
    </div>


</div>
    </div>
