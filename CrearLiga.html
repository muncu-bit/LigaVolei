<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crear Liga</title>
    
</head>
<body>

<div class="phone">
    <div class="header">
        <div class="menu"></div>
        <div class="user"></div>
    </div>

    <h2>CREAR LIGA</h2>

    <div class="card">
        <label>Nombre Liga</label>
        <input type="text" placeholder="Ingresar nombre">

        <label>Descripción Liga</label>
        <input type="text" placeholder="Ingresa descripción">

        <label>Ingresa foto liga</label>
        <div class="image-box">
            <span></span> <!--Aquí va una imagen-->
        </div>

        <label>Elige estadio</label>
        <div class="radios">
            <label><input type="radio" name="estadio"> Estadio 1</label>
            <label><input type="radio" name="estadio"> Estadio 2</label>
            <label><input type="radio" name="estadio"> Estadio 3</label>
        </div>

        

        <div class="buttons">
            <button class="btn btn-create">CREAR</button>
            <button class="btn btn-cancel">CANCELAR</button>
        </div>
    </div>
</div>

</body>
</html>
